<!DOCTYPE html>
<html>
<head>
    <title>AI Scam Honeypot Dashboard</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 80px; }
        button { padding: 10px 20px; background: #1e88e5; color: white; border: none; }
        .scam { color: red; }
        .safe { color: green; }
        pre { background: #eee; padding: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🛡️ AI Scam Detection Honeypot</h2>

    <form method="POST">
        <textarea name="message" placeholder="Paste incoming message here..."></textarea><br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <hr>
        {% if result.is_scam %}
            <h3 class="scam">⚠️ Scam Detected</h3>
            <p><b>Confidence:</b> {{ result.confidence }}</p>
            <p><b>LLM Agent Reply:</b> {{ result.agent_reply }}</p>
            <p><b>Extracted Intelligence:</b></p>
            <pre>{{ result.extracted_data }}</pre>
        {% else %}
            <h3 class="safe">✅ Message Looks Safe</h3>
        {% endif %}
    {% endif %}
</div>

</body>
</html>
